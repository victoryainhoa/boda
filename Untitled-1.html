<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta property="og:title" content="Boda Ainhoa y Víctor">
    <meta property="og:description" content="Nos haría mucha ilusión que nos acompañaras en este día tan especial. Confirma tu asistencia aquí.">
    <meta property="og:image" content="https://victoryainhoa.github.io/boda/imagen.jpg">
    <meta property="og:image:type" content="image/jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://tu-usuario.github.io">
    <meta property="og:type" content="website">

    <title>Boda Ainhoa y Víctor</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
<style>
    /* DEFINICIÓN DE VARIABLES OTOÑALES */
    :root {
        --color-verde-bosque: #2d4a41; /* El verde de las hojas */
        --color-dorado-viejo: #c5a059; /* El dorado apagado */
        
        /* NUEVO: Un ocre semi-transparente para el fondo del formulario */
        --color-fondo-formulario: rgba(139, 108, 66, 0.4); /* Un marrón suave muy transparente */
        
        --color-texto-oscuro: #333333;
        --color-crema-suave: #fffcf4; /* Para contrastes suaves */
    }

    /* ESTILOS GENERALES Y ELIMINACIÓN DE FLEXBOX */
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        /* overflow: hidden; */ /* Mantenemos el scroll permitido */
        background-color: #fdfcf9; 
    }

    body {
        font-family: 'Lato', sans-serif; /* Usamos Lato para máxima legibilidad en textos pequeños */
        line-height: 1.6;
        color: var(--color-texto-oscuro);
    }

    /* CONTENEDOR PRINCIPAL CON EL FONDO */
    .main-wrapper {
        width: 100%;
        min-height: 100vh;
        
        background-image: url('fondo3.png');
        background-repeat: no-repeat;
        background-position: top center;
        background-size: cover;
        background-attachment: scroll; 
        
        display: flex;
        justify-content: center; 
        align-items: flex-start; 
        
        padding-top: 50px; /* Un poco de padding arriba para que no pegue al borde superior de la imagen */
        box-sizing: border-box;
    }

    /* CONTENEDOR DEL FORMULARIO - REDISEÑADO OTOÑAL Y SUAVE */
    .container {
        /* ¡¡NUEVO FONDO!! Ocre semi-transparente */
        background: var(--color-fondo-formulario);
        
        padding: 35px 30px;
        
        /* ¡¡NUEVO RADIUS!! Esquinas mucho más redondeadas */
        border-radius: 20px; 
        
        box-shadow: 0 15px 35px rgba(0,0,0,0.15); /* Sombra más suave y extendida */
        width: 85%;
        max-width: 380px; /* Un poco más ancho para equilibrar */
        text-align: center;
        
        /* Bordes suavizados */
        border: 1px solid rgba(197, 160, 89, 0.5); /* Dorado viejo semi-transparente */
        
        position: relative; 
        
        /* Eliminamos la outline decorativa dura que no combina con lo suave */
        /* outline: 8px solid var(--color-crema); */
        /* outline-offset: -15px; */
        
        /* Mantenemos el posicionamiento horizontal y vertical con márgenes */
        margin-top: 550px; /* Ajusta este valor para situar el formulario exactamente debajo del texto del fondo */
        margin-bottom: 70px; 
        
        /* Efecto de cristal difuminado detrás */
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-sizing: border-box;
    }

    /* TÍTULO DEL FORMULARIO - TIPOGRAFÍA SERIF ELEGANTE */
    h1 {
        /* Usamos Playfair Display ( Serif ) para títulos */
        font-family: 'Playfair Display', serif;
        font-size: 1.9rem;
        color: var(--color-verde-bosque);
        margin-top: 0;
        margin-bottom: 25px;
        font-weight: 700;
        line-height: 1.2;
    }

    /* ESTILOS DE FORMULARIO - SUAVES Y LEGIBLES */
    .form-group {
        margin-bottom: 20px;
        text-align: left; /* Etiquetas a la izquierda para mejor legibilidad */
    }

    label {
        display: block;
        margin-bottom: 7px;
        font-weight: 700;
        font-size: 0.75rem; /* Un poco más grande */
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--color-verde-bosque);
    }

    input {
        width: 100%;
        padding: 12px; /* Más padding para suavidad */
        
        /* ¡¡NUEVO FONDO Y BORDE!! Transparentes y suaves */
        border: 1px solid rgba(0,0,0,0.1); /* Borde sutil */
        border-radius: 8px; /* Esquinas redondeadas */
        background-color: rgba(255, 255, 255, 0.4); /* Fondo semi-transparente */
        
        font-size: 1rem;
        color: var(--color-texto-oscuro);
        box-sizing: border-box;
        transition: all 0.3s ease;
    }

    input:focus {
        outline: none;
        border-color: var(--color-dorado-viejo); /* Resaltado al enfocar */
        background-color: rgba(255, 255, 255, 0.7);
    }

    /* ESTILO DEL BOTÓN - OTOÑAL Y SUAVE */
    .btn-save {
        width: 100%;
        padding: 15px;
        cursor: pointer;
        
        /* Bordes y esquinas suaves */
        border: 2px solid var(--color-verde-bosque);
        border-radius: 50px; /* Botón píldora, muy redondeado */
        
        font-weight: 700;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 2.5px;
        
        /* Colores otoño-bosque */
        background-color: var(--color-verde-bosque);
        color: white;
        
        transition: all 0.4s ease;
        margin-top: 10px;
    }

    .btn-save:hover {
        background-color: white;
        color: var(--color-verde-bosque);
    }
    
    .btn-save:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    /* MENSAJE FINAL - TIPOGRAFÍA SERIF ELEGANTE */
    #mensaje-final {
        display: none;
        padding: 20px 10px;
        font-family: 'Playfair Display', serif;
        font-size: 1.3rem;
        font-style: italic;
        color: var(--color-verde-bosque);
        line-height: 1.5;
    }
    
    .sparkle {
        font-size: 1.8rem;
        color: var(--color-dorado-viejo);
        margin-bottom: 10px;
        display: block;
    }

    /* AJUSTES ESPECÍFICOS PARA MÓVIL */
    @media (max-width: 480px) {
        .main-wrapper {
            background-size: cover; 
            background-position: top center;
        }
        .container { 
            padding: 30px 20px;
            
            /* ¡¡MANTENEMOS TU POSICIONAMIENTO!! Ajusta el margin-top para que el formulario se posicione 
               correctamente debajo del texto del fondo en pantallas de móvil. */
            margin-top: 510px; /* Mantienes tu valor actualizado de 510px */
            
            margin-bottom: 40px; 
            border-radius: 15px;
        }
        h1 { font-size: 1.7rem; }
        label { font-size: 0.7rem; letter-spacing: 1.8px; }
        input { padding: 10px; font-size: 0.95rem; }
        .btn-save { padding: 13px; font-size: 0.85rem; letter-spacing: 2px; }
    }
</style>
</head>
<body>

<div class="main-wrapper"> <div class="container" id="main-container">
        <div id="formulario-boda">
            <label for="nombreInput">Nombre</label>
            <input type="text" id="nombreInput" placeholder="Tu nombre">

            <label for="apellidoInput">Apellidos</label>
            <input type="text" id="apellidoInput" placeholder="Tus apellidos">

            <label for="numInput">Acompañantes</label>
            <input type="number" id="numInput" value="0" min="0">

            <label for="alergiaInput">¿Alergias?</label>
            <input type="text" id="alergiaInput" placeholder="Indícalo aquí">

            <button class="btn-save" id="btnEnviar" onclick="guardarRegistro()">Confirmar Asistencia</button>
        </div>

        <div id="mensaje-final">
            ✨ <br>
            <b>¡Confirmación enviada!</b><br>
            Muchas gracias por acompañarnos.<br>
            <br>
            <span style="font-size: 1rem; color: var(--color-dorado);">Ainhoa & Víctor</span>
        </div>
    </div>

</div>

<script>
    const UPSTASH_URL = "https://glad-lizard-60703.upstash.io";
    const UPSTASH_TOKEN = "Ae0fAAIncDE4YjZlNGY4ZTYzMDE0ZGVjODcwZmE0NGRiNmY2NzJmNHAxNjA3MDM";

    async function guardarRegistro() {
        const nombre = document.getElementById('nombreInput').value.trim();
        const apellido = document.getElementById('apellidoInput').value.trim();
        const num = document.getElementById('numInput').value.trim();
        const alergia = document.getElementById('alergiaInput').value.trim();
        const btn = document.getElementById('btnEnviar');

        if (!nombre || !apellido) {
            alert("Por favor, introduce al menos tu Nombre y Apellido.");
            return;
        }

        btn.innerText = "⏳ ENVIANDO...";
        btn.disabled = true;

        const redisKey = `${nombre}_${apellido}`;
        const datos = {
            acompañantes: num || "0",
            alergias: alergia || "Ninguna"
        };

        try {
            const url = `${UPSTASH_URL}/set/${encodeURIComponent(redisKey)}/${encodeURIComponent(JSON.stringify(datos))}`;
            const respuesta = await fetch(url, { headers: { Authorization: `Bearer ${UPSTASH_TOKEN}` } });
            
            if (respuesta.ok) {
                document.getElementById('formulario-boda').style.display = 'none';
                document.getElementById('mensaje-final').style.display = 'block';
            } else {
                throw new Error("Error en la respuesta");
            }
        } catch (error) {
            alert("Hubo un problema con el envío.");
            btn.innerText = "CONFIRMAR ASISTENCIA";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
