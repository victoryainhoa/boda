<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Configuración de Vista Previa para WhatsApp -->
    <meta property="og:title" content="Boda Ainhoa y Víctor">
    <meta property="og:description" content="Nos haría mucha ilusión que nos acompañaras en este día tan especial. Confirma tu asistencia aquí.">
    <meta property="og:image" content="https://victoryainhoa.github.io">
    <meta property="og:image:type" content="image/webp">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://tu-usuario.github.io">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <title>Boda Ainhoa y Víctor</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --color-verde: #2d4a41;
            --color-dorado: #c5a059;
            --color-crema: rgba(255, 250, 240, 0.92); /* Un poco más de transparencia para ver el fondo */
            --color-texto: #333333;
        }

        body {
            font-family: 'Lato', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            
            /* AJUSTE DE DIMENSIONES DE LA FOTO */
            background-image: url('fondo.webp');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover; /* La imagen cubre toda la pantalla siempre */
            background-attachment: fixed; /* La imagen se queda quieta al hacer scroll */
        }

        .container {
            background: var(--color-crema);
            padding: 50px 40px;
            border-radius: 2px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 90%; /* Ajuste para móviles */
            max-width: 420px;
            text-align: center;
            border: 1px solid var(--color-dorado);
            position: relative;
            outline: 10px solid var(--color-crema);
            outline-offset: -20px;
            margin: 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--color-verde);
            margin-bottom: 10px;
            font-weight: 400;
        }

        .fecha-boda {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--color-dorado);
            margin-bottom: 30px;
            display: block;
            font-size: 1.1rem;
        }

        label {
            display: block;
            text-align: center;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--color-verde);
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 25px;
            border: none;
            border-bottom: 1px solid var(--color-dorado);
            background-color: transparent;
            font-size: 1rem;
            color: var(--color-texto);
            text-align: center;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-bottom: 1px solid var(--color-verde);
        }

        .btn-save {
            width: 100%;
            padding: 16px;
            cursor: pointer;
            border-radius: 0;
            border: 1px solid var(--color-verde);
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background-color: var(--color-verde);
            color: white;
            transition: all 0.4s ease;
            margin-top: 10px;
        }

        .btn-save:hover {
            background-color: transparent;
            color: var(--color-verde);
        }

        #mensaje-final {
            display: none;
            padding: 30px;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-style: italic;
            color: var(--color-verde);
            line-height: 1.6;
        }

        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .container { padding: 40px 20px; }
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div id="formulario-boda">
        <h1>Ainhoa & Víctor</h1>
        <span class="fecha-boda">Nuestra Boda</span>
        
        <label for="nombreInput">Nombre</label>
        <input type="text" id="nombreInput" placeholder="Tu nombre">

        <label for="apellidoInput">Apellidos</label>
        <input type="text" id="apellidoInput" placeholder="Tus apellidos">

        <label for="numInput">Número de acompañantes</label>
        <input type="number" id="numInput" value="0" min="0">

        <label for="alergiaInput">¿Alguna alergia o intolerancia?</label>
        <input type="text" id="alergiaInput" placeholder="Indícalo aquí">

        <button class="btn-save" id="btnEnviar" onclick="guardarRegistro()">Confirmar Asistencia</button>
    </div>

    <div id="mensaje-final">
        ✨ <br>
        <b>¡Confirmación enviada!</b><br>
        Muchas gracias por compartir este día tan especial con nosotros.<br>
        <br>
        <span style="font-size: 1.2rem; color: var(--color-dorado);">Ainhoa & Víctor</span>
    </div>
</div>

<script>
    const UPSTASH_URL = "https://glad-lizard-60703.upstash.io";
    const UPSTASH_TOKEN = "Ae0fAAIncDE4YjZlNGY4ZTYzMDE0ZGVjODcwZmE0NGRiNmY2NzJmNHAxNjA3MDM";

    async function guardarRegistro() {
        const nombre = document.getElementById('nombreInput').value.trim();
        const apellido = document.getElementById('apellidoInput').value.trim();
        const num = document.getElementById('numInput').value.trim();
        const alergia = document.getElementById('alergiaInput').value.trim();
        const btn = document.getElementById('btnEnviar');

        if (!nombre || !apellido) {
            alert("Por favor, introduce al menos tu Nombre y Apellido.");
            return;
        }

        btn.innerText = "⏳ ENVIANDO...";
        btn.disabled = true;

        const redisKey = `${nombre}_${apellido}`;
        const datos = {
            acompañantes: num || "0",
            alergias: alergia || "Ninguna"
        };

        try {
            const url = `${UPSTASH_URL}/set/${encodeURIComponent(redisKey)}/${encodeURIComponent(JSON.stringify(datos))}`;
            const respuesta = await fetch(url, { headers: { Authorization: `Bearer ${UPSTASH_TOKEN}` } });
            
            if (respuesta.ok) {
                document.getElementById('formulario-boda').style.display = 'none';
                document.getElementById('mensaje-final').style.display = 'block';
            } else {
                throw new Error("Error en la respuesta");
            }
        } catch (error) {
            alert("Hubo un problema con el envío. Por favor, inténtalo de nuevo.");
            btn.innerText = "CONFIRMAR ASISTENCIA";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
