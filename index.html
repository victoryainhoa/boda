<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Boda Ainhoa y Víctor">
    <meta property="og:description" content="Nos haría mucha ilusión que nos acompañaras en este día tan especial. Confirma tu asistencia aquí.">
    <meta property="og:image" content="https://victoryainhoa.github.io/boda/preview.webp">
    <meta property="og:image:type" content="image/webp">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://tu-usuario.github.io">
    <meta property="og:type" content="website">

    <title>Boda Ainhoa y Víctor</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --color-verde: #2d4a41;
            --color-dorado: #c5a059;
            /* Transparencia ajustada al 75% para que se vea bien el fondo */
            --color-crema: rgba(255, 250, 240, 0.75);
            --color-texto: #333333;
        }

        body {
            font-family: 'Lato', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            /* CAMBIO CLAVE: Alineamos el contenido al final (abajo) */
            align-items: flex-end; 
            min-height: 100vh;
            
            background-image: url('fondo2.webp');
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain; 
            background-attachment: fixed;
            background-color: #fdfcf9; 
        }

        .container {
            background: var(--color-crema);
            padding: 35px 30px;
            border-radius: 2px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 360px;
            text-align: center;
            border: 1px solid var(--color-dorado);
            position: relative;
            outline: 8px solid var(--color-crema);
            outline-offset: -15px;
            
            /* Margen inferior para que no pegue abajo del todo */
            margin-bottom: 140px; 
            /* Un pequeño toque de desenfoque detrás del cuadro para que el texto se lea mejor */
            /*backdrop-filter: blur(5px); */
            -webkit-backdrop-filter: blur(5px);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--color-verde);
            margin-bottom: 5px;
            font-weight: 400;
        }

        label {
            display: block;
            text-align: center;
            margin-bottom: 5px;
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--color-verde);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: none;
            border-bottom: 1px solid var(--color-dorado);
            background-color: transparent;
            font-size: 1rem;
            color: var(--color-texto);
            text-align: center;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-bottom: 1px solid var(--color-verde);
        }

        .btn-save {
            width: 100%;
            padding: 14px;
            cursor: pointer;
            border: 1px solid var(--color-verde);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background-color: var(--color-verde);
            color: white;
            transition: all 0.4s ease;
        }

        .btn-save:hover {
            background-color: white;
            color: var(--color-verde);
        }

        #mensaje-final {
            display: none;
            padding: 20px;
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-style: italic;
            color: var(--color-verde);
            line-height: 1.5;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .container { 
                margin-bottom: 30px; /* Un poco menos de margen en móviles */
                width: 90%;
            }
            body { background-size: 100% auto; }
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div id="formulario-boda">
        <label for="nombreInput">Nombre</label>
        <input type="text" id="nombreInput" placeholder="Tu nombre">

        <label for="apellidoInput">Apellidos</label>
        <input type="text" id="apellidoInput" placeholder="Tus apellidos">

        <label for="numInput">Número de acompañantes</label>
        <input type="number" id="numInput" value="0" min="0">

        <label for="alergiaInput">¿Alguna alergia o intolerancia?</label>
        <input type="text" id="alergiaInput" placeholder="Indícalo aquí">

        <button class="btn-save" id="btnEnviar" onclick="guardarRegistro()">Confirmar Asistencia</button>
    </div>

    <div id="mensaje-final">
        ✨ <br>
        <b>¡Confirmación enviada!</b><br>
        Muchas gracias por compartir este día tan especial con nosotros.<br>
        <br>
        <span style="font-size: 1.1rem; color: var(--color-dorado);">Ainhoa & Víctor</span>
    </div>
</div>

<script>
    const UPSTASH_URL = "https://glad-lizard-60703.upstash.io";
    const UPSTASH_TOKEN = "Ae0fAAIncDE4YjZlNGY4ZTYzMDE0ZGVjODcwZmE0NGRiNmY2NzJmNHAxNjA3MDM";

    async function guardarRegistro() {
        const nombre = document.getElementById('nombreInput').value.trim();
        const apellido = document.getElementById('apellidoInput').value.trim();
        const num = document.getElementById('numInput').value.trim();
        const alergia = document.getElementById('alergiaInput').value.trim();
        const btn = document.getElementById('btnEnviar');

        if (!nombre || !apellido) {
            alert("Por favor, introduce al menos tu Nombre y Apellido.");
            return;
        }

        btn.innerText = "⏳ ENVIANDO...";
        btn.disabled = true;

        const redisKey = `${nombre}_${apellido}`;
        const datos = {
            acompañantes: num || "0",
            alergias: alergia || "Ninguna"
        };

        try {
            const url = `${UPSTASH_URL}/set/${encodeURIComponent(redisKey)}/${encodeURIComponent(JSON.stringify(datos))}`;
            const respuesta = await fetch(url, { headers: { Authorization: `Bearer ${UPSTASH_TOKEN}` } });
            
            if (respuesta.ok) {
                document.getElementById('formulario-boda').style.display = 'none';
                document.getElementById('mensaje-final').style.display = 'block';
            } else {
                throw new Error("Error en la respuesta");
            }
        } catch (error) {
            alert("Hubo un problema con el envío. Por favor, inténtalo de nuevo.");
            btn.innerText = "CONFIRMAR ASISTENCIA";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
