<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Web con Redis</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; margin-bottom: 5px; cursor: pointer; border: none; border-radius: 5px; color: white; transition: 0.3s; }
        #btnGuardar { background: #2ea44f; }
        #btnLeer { background: #24292e; }
        button:hover { opacity: 0.8; }
        #resultado { margin-top: 15px; font-size: 0.9rem; color: #555; min-height: 1.2em; }
    </style>
</head>
<body>

<div class="card">
    <h3>Registro Redis</h3>
    <input type="text" id="nombreInput" placeholder="Escribe un nombre">
    
    <button id="btnGuardar">Guardar en Redis</button>
    <button id="btnLeer">Consultar último</button>
    
    <p id="resultado">Esperando acción...</p>
</div>

<!-- IMPORTANTE: type="module" para usar 'import' -->
<script type="module">
    // Usamos el CDN de Skypack o esm.sh que son compatibles con el navegador
    import { Redis } from 'https://cdn.skypack.dev';

    // Configuración de tu base de datos
    const redis = new Redis({
      url: 'https://glad-lizard-60703.upstash.io',
      token: 'Ae0fAAIncDE4YjZlNGY4ZTYzMDE0ZGVjODcwZmE0NGRiNmY2NzJmNHAxNjA3MDM', // <--- ¡ASEGÚRATE DE CAMBIAR ESTO!
    });

    const input = document.getElementById('nombreInput');
    const display = document.getElementById('resultado');

    // Manejador del botón GUARDAR
    document.getElementById('btnGuardar').addEventListener('click', async () => {
        const nombre = input.value.trim();
        
        if (!nombre) {
            display.innerText = "⚠️ Por favor, escribe algo.";
            return;
        }

        try {
            display.innerText = "⏳ Guardando...";
            await redis.set("usuario_actual", nombre);
            display.innerText = "✅ ¡" + nombre + " guardado!";
            input.value = ""; // Limpiar input
        } catch (error) {
            console.error(error);
            display.innerText = "❌ Error al guardar.";
        }
    });

    // Manejador del botón LEER
    document.getElementById('btnLeer').addEventListener('click', async () => {
        try {
            display.innerText = "⏳ Leyendo...";
            const data = await redis.get("usuario_actual");
            
            if (data) {
                display.innerText = "👤 Último nombre: " + data;
            } else {
                display.innerText = "📭 No hay datos en Redis.";
            }
        } catch (error) {
            console.error(error);
            display.innerText = "❌ Error al leer.";
        }
    });
</script>

</body>
</html>
