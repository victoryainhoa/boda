<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta property="og:title" content="Boda Ainhoa y Víctor">
    <meta property="og:description" content="Nos haría mucha ilusión que nos acompañaras en este día tan especial. Confirma tu asistencia aquí.">
    <meta property="og:image" content="https://victoryainhoa.github.io/boda/imagen.jpg">
    <meta property="og:image:type" content="image/jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://tu-usuario.github.io">
    <meta property="og:type" content="website">

    <title>Boda Ainhoa y Víctor</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
<style>
        :root {
            --color-verde: #2d4a41;
            --color-dorado: #c5a059;
            --color-crema: rgba(255, 250, 240, 0.75);
            --color-texto: #333333;
        }

        /* CONFIGURACIÓN CRÍTICA DEL FONDO Y SCROLL */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* overflow: hidden; */ /* ¡¡IMPORTANTE!! ELIMINADO PARA PERMITIR EL SCROLL */
            background-color: #fdfcf9; 
        }

        body {
            font-family: 'Lato', sans-serif;
            display: flex;
            justify-content: center;
            /* align-items: flex-end; */ /* ¡¡IMPORTANTE!! CAMBIADO. FLEX-END EMPUJA EL FORMULARIO ABAJO */
            align-items: center; /* ¡¡NUEVO!! Centrar el formulario en el espacio de scroll */
            
            background-image: url('fondo3.png');
            background-repeat: no-repeat;
            background-position: top center; /* ¡¡NUEVO!! Anclar la imagen a la parte superior */
            background-size: cover; /* Mantenemos cover para llenar la pantalla de ancho */
            background-attachment: fixed;
            
            /* ¡¡NUEVO!! Asegurar que el body tenga al menos el alto de la pantalla 
               para que la imagen se vea siempre, y permita hacer scroll hacia abajo. */
            min-height: 100vh; 
        }

        /* CONTENEDOR DEL FORMULARIO - AJUSTADO */
        .container {
            background: var(--color-crema);
            padding: 30px 25px;
            border-radius: 2px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 350px;
            text-align: center;
            border: 1px solid var(--color-dorado);
            position: relative;
            outline: 8px solid var(--color-crema);
            outline-offset: -15px;
            
            /* ¡¡MODIFICADO!! Usamos márgenes para separar el formulario del texto del fondo. 
               El margin-top es crítico para "empujarlo" hacia abajo de las letras. */
            margin-top: 550px; /* ¡¡NUEVO!! Empuja el formulario hacia abajo, pasado el texto de la imagen. Ajusta este valor según la altura de tu fondo y texto. */
            margin-bottom: 65px; 
            
            backdrop-filter: blur(5px);
            /*-webkit-backdrop-filter: blur(5px);*/
            box-sizing: border-box;
        }

        /* ... (Tus h1, label, input, btn-save, mensaje-final iguales) ... */

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--color-verde);
            margin-bottom: 5px;
            font-weight: 400;
        }

        label {
            display: block;
            text-align: center;
            margin-bottom: 3px;
            font-weight: 700;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--color-verde);
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
            border: none;
            border-bottom: 1px solid var(--color-dorado);
            background-color: transparent;
            font-size: 0.95rem;
            color: var(--color-texto);
            text-align: center;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-bottom: 1px solid var(--color-verde);
        }

        .btn-save {
            width: 100%;
            padding: 12px;
            cursor: pointer;
            border: 1px solid var(--color-verde);
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background-color: var(--color-verde);
            color: white;
            transition: all 0.4s ease;
        }

        .btn-save:hover {
            background-color: white;
            color: var(--color-verde);
        }

        #mensaje-final {
            display: none;
            padding: 10px;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-style: italic;
            color: var(--color-verde);
            line-height: 1.4;
        }

        /* AJUSTES ESPECÍFICOS PARA MÓVIL */
        @media (max-width: 480px) {
            body {
                background-size: cover; 
                background-position: top center;
            }
            .container { 
                padding: 25px 20px;
                /* ¡¡NUEVO!! Ajusta el margin-top para que el formulario se posicione 
                   correctamente debajo del texto del fondo en pantallas de móvil. */
                margin-top: 480px; 
                margin-bottom: 30px; 
            }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div id="formulario-boda">
        <label for="nombreInput">Nombre</label>
        <input type="text" id="nombreInput" placeholder="Tu nombre">

        <label for="apellidoInput">Apellidos</label>
        <input type="text" id="apellidoInput" placeholder="Tus apellidos">

        <label for="numInput">Acompañantes</label>
        <input type="number" id="numInput" value="0" min="0">

        <label for="alergiaInput">¿Alergias?</label>
        <input type="text" id="alergiaInput" placeholder="Indícalo aquí">

        <button class="btn-save" id="btnEnviar" onclick="guardarRegistro()">Confirmar Asistencia</button>
    </div>

    <div id="mensaje-final">
        ✨ <br>
        <b>¡Confirmación enviada!</b><br>
        Muchas gracias por acompañarnos.<br>
        <br>
        <span style="font-size: 1rem; color: var(--color-dorado);">Ainhoa & Víctor</span>
    </div>
</div>

<script>
    const UPSTASH_URL = "https://glad-lizard-60703.upstash.io";
    const UPSTASH_TOKEN = "Ae0fAAIncDE4YjZlNGY4ZTYzMDE0ZGVjODcwZmE0NGRiNmY2NzJmNHAxNjA3MDM";

    async function guardarRegistro() {
        const nombre = document.getElementById('nombreInput').value.trim();
        const apellido = document.getElementById('apellidoInput').value.trim();
        const num = document.getElementById('numInput').value.trim();
        const alergia = document.getElementById('alergiaInput').value.trim();
        const btn = document.getElementById('btnEnviar');

        if (!nombre || !apellido) {
            alert("Por favor, introduce al menos tu Nombre y Apellido.");
            return;
        }

        btn.innerText = "⏳ ENVIANDO...";
        btn.disabled = true;

        const redisKey = `${nombre}_${apellido}`;
        const datos = {
            acompañantes: num || "0",
            alergias: alergia || "Ninguna"
        };

        try {
            const url = `${UPSTASH_URL}/set/${encodeURIComponent(redisKey)}/${encodeURIComponent(JSON.stringify(datos))}`;
            const respuesta = await fetch(url, { headers: { Authorization: `Bearer ${UPSTASH_TOKEN}` } });
            
            if (respuesta.ok) {
                document.getElementById('formulario-boda').style.display = 'none';
                document.getElementById('mensaje-final').style.display = 'block';
            } else {
                throw new Error("Error en la respuesta");
            }
        } catch (error) {
            alert("Hubo un problema con el envío.");
            btn.innerText = "CONFIRMAR ASISTENCIA";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
