<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta property="og:title" content="Boda Ainhoa y Víctor">
    <meta property="og:description" content="Nos haría mucha ilusión que nos acompañaras en este día tan especial. Confirma tu asistencia aquí.">
    <meta property="og:image" content="https://victoryainhoa.github.io/boda/imagen.jpg">
    <meta property="og:image:type" content="image/jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://tu-usuario.github.io">
    <meta property="og:type" content="website">

    <title>Boda Ainhoa y Víctor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400;1,700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
<style>
    /* DEFINICIÓN DE VARIABLES OTOÑALES Y ELEGANTES */
    :root {
        --color-verde-bosque: #2d4a41;
        --color-dorado-viejo: #c5a059;
        
        /* Ocre semi-transparente para el fondo del formulario */
        --color-fondo-formulario: rgba(139, 108, 66, 0.45); 
        
        --color-texto-oscuro: #333333;
        --color-crema-suave: #fffcf4;
    }

    /* ESTILOS GENERALES Y ELIMINACIÓN DE FLEXBOX */
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        /* overflow: hidden; */ /* Mantenemos el scroll permitido */
        background-color: #fdfcf9; 
    }

    body {
        /* ¡¡ELEGANCIA!! Lora para el cuerpo del formulario */
        font-family: 'Lora', serif; 
        line-height: 1.5; /* Un poco menos para compactar */
        color: var(--color-texto-oscuro);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    /* CONTENEDOR PRINCIPAL CON EL FONDO */
    .main-wrapper {
        width: 100%;
        min-height: 100vh;
        
        background-image: url('fondo5.png');
        background-repeat: no-repeat;
        background-position: top center;
        background-size: cover;
        background-attachment: scroll; 
        
        display: flex;
        justify-content: center; 
        align-items: flex-start; 
        
        padding-top: 50px; 
        box-sizing: border-box;
    }

    /* CONTENEDOR DEL FORMULARIO - REDISEÑADO COMPACTO Y PEQUEÑO */
    .container {
        background: var(--color-fondo-formulario);
        
        /* ¡¡REDUCCIÓN DRÁSTICA!! Padding interno compacto */
        padding: 20px 18px; 
        
        border-radius: 15px; /* Esquinas suaves, no exageradas */
        
        box-shadow: 0 10px 25px rgba(0,0,0,0.12); /* Sombra más sutil */
        
        /* ¡¡REDUCCIÓN DRÁSTICA!! Anchura mucho más estrecha */
        width: 80%; 
        max-width: 320px; 
        
        text-align: center;
        border: 1px solid rgba(197, 160, 89, 0.4); 
        position: relative; 
        
        /* Eliminamos la outline decorativa dura */
        /* outline: 8px solid var(--color-crema); */
        /* outline-offset: -15px; */
        
        /* ¡¡REDUCCIÓN CRÍTICA!! Ajustamos margin-top para que se sitúe 
           perfectamente DEBAJO de "Fundación a la par...". Prueba valores como 
           420px, 430px o 440px según la altura real de tu imagen y texto. */
        margin-top: 430px; 
        margin-bottom: 60px; 
        
        /* Efecto de cristal difuminado */
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-sizing: border-box;
    }

    /* TÍTULO DEL FORMULARIO - TIPOGRAFÍA SERIF ELEGANTE */
    h1 {
        /* Usamos Playfair Display para títulos */
        font-family: 'Playfair Display', serif;
        font-size: 1.8rem; /* Reducido para compactar */
        color: var(--color-verde-bosque);
        margin-top: 0;
        margin-bottom: 15px; /* Reducido */
        font-weight: 700;
        line-height: 1.1;
    }

    /* ESTILOS DE FORMULARIO - COMPACTOS Y LEGIBLES */
    .form-group {
        margin-bottom: 10px; /* ¡¡REDUCCIÓN DRÁSTICA!! Grupos más juntos */
        text-align: left; 
    }

    label {
        display: block;
        margin-bottom: 2px; /* ¡¡REDUCCIÓN DRÁSTICA!! Pegado a la text box */
        font-weight: 700;
        
        /* Lora refinada para etiquetas */
        font-size: 0.75rem; /* Un poco más pequeña */
        text-transform: capitalize; 
        letter-spacing: 1px;
        
        color: var(--color-verde-bosque);
    }

    input {
        width: 100%;
        padding: 7px 10px; /* ¡¡REDUCCIÓN DRÁSTICA!! Text box más delgada */
        
        border: 1px solid rgba(0,0,0,0.06); /* Borde sutilísimo */
        border-radius: 6px; 
        background-color: rgba(255, 255, 255, 0.3); 
        
        /* Lora para los inputs */
        font-family: 'Lora', serif;
        font-size: 0.95rem; /* Reducido */
        color: var(--color-texto-oscuro);
        box-sizing: border-box;
        transition: all 0.3s ease;
    }

    input:focus {
        outline: none;
        border-color: var(--color-dorado-viejo); 
        background-color: rgba(255, 255, 255, 0.6);
    }
    
    /* Placeholders en Lora, sutiles */
    input::placeholder {
        font-family: 'Lora', serif;
        color: #999;
        font-style: italic;
        opacity: 0.8;
    }

    /* ESTILO DEL BOTÓN - ELEGANTEMENTE REDONDEADADO Y COMPACTO */
    .btn-save {
        width: 100%;
        padding: 11px 15px; /* ¡¡REDUCCIÓN DRÁSTICA!! Botón más compacto */
        cursor: pointer;
        border: 1.5px solid var(--color-verde-bosque);
        border-radius: 40px; 
        
        /* Lora para el botón, elegante */
        font-family: 'Lora', serif;
        font-weight: 700;
        font-size: 0.85rem; /* Reducido */
        text-transform: uppercase;
        letter-spacing: 2px; /* Reducido */
        
        background-color: var(--color-verde-bosque);
        color: white;
        
        transition: all 0.4s ease;
        margin-top: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .btn-save:hover {
        background-color: white;
        color: var(--color-verde-bosque);
        box-shadow: 0 6px 15px rgba(0,0,0,0.12);
        transform: translateY(-1px);
    }
    
    .btn-save:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    /* MENSAJE FINAL - TIPOGRAFÍA SERIF ELEGANTE Y COMPACTA */
    #mensaje-final {
        display: none;
        padding: 15px 10px; /* Reducido */
        font-family: 'Playfair Display', serif;
        font-size: 1.25rem; /* Reducido */
        font-style: italic;
        color: var(--color-verde-bosque);
        line-height: 1.4;
    }
    
    .sparkle {
        font-size: 1.6rem;
        color: var(--color-dorado-viejo);
        margin-bottom: 8px;
        display: block;
    }

    /* AJUSTES ESPECÍFICOS PARA MÓVIL */
    @media (max-width: 480px) {
        .main-wrapper {
            background-size: cover; 
            background-position: top center;
        }
        .container { 
            padding: 20px 15px; /* Aún más compacto en móvil */
            
            /* ¡¡MANTENEMOS TU POSICIONAMIENTO COMPACTO!! 420px */
            margin-top: 510px; 
            
            margin-bottom: 30px; 
            border-radius: 12px;
            width: 85%;
        }
        h1 { font-size: 1.6rem; }
        label { font-size: 0.7rem; letter-spacing: 1px; }
        input { padding: 6px 8px; font-size: 0.9rem; }
        .btn-save { padding: 10px; font-size: 0.8rem; letter-spacing: 1.5px; }
    }
</style>
</head>
<body>

<div class="main-wrapper"> <div class="container" id="main-container">
        <div id="formulario-boda">
            <label for="nombreInput">Nombre</label>
            <input type="text" id="nombreInput" placeholder="Tu nombre">

            <label for="apellidoInput">Apellidos</label>
            <input type="text" id="apellidoInput" placeholder="Tus apellidos">

            <label for="numInput">Acompañantes</label>
            <input type="number" id="numInput" value="0" min="0">

            <label for="alergiaInput">¿Alergias?</label>
            <input type="text" id="alergiaInput" placeholder="Indícalo aquí">

            <button class="btn-save" id="btnEnviar" onclick="guardarRegistro()">Confirmar Asistencia</button>
        </div>

        <div id="mensaje-final">
            ✨ <br>
            <b>¡Confirmación enviada!</b><br>
            Y sin más dilación, ¡te esperamos con emoción!<br>
            <br>
            <span style="font-size: 1rem; color: var(--color-dorado);">Ainhoa & Víctor</span>
        </div>
    </div>

</div>

<script>
    const UPSTASH_URL = "https://glad-lizard-60703.upstash.io";
    const UPSTASH_TOKEN = "Ae0fAAIncDE4YjZlNGY4ZTYzMDE0ZGVjODcwZmE0NGRiNmY2NzJmNHAxNjA3MDM";

    async function guardarRegistro() {
        const nombre = document.getElementById('nombreInput').value.trim();
        const apellido = document.getElementById('apellidoInput').value.trim();
        const num = document.getElementById('numInput').value.trim();
        const alergia = document.getElementById('alergiaInput').value.trim();
        const btn = document.getElementById('btnEnviar');

        if (!nombre || !apellido) {
            alert("Por favor, introduce al menos tu Nombre y Apellido.");
            return;
        }

        btn.innerText = "⏳ ENVIANDO...";
        btn.disabled = true;

        const redisKey = `${nombre}_${apellido}`;
        const datos = {
            acompañantes: num || "0",
            alergias: alergia || "Ninguna"
        };

        try {
            const url = `${UPSTASH_URL}/set/${encodeURIComponent(redisKey)}/${encodeURIComponent(JSON.stringify(datos))}`;
            const respuesta = await fetch(url, { headers: { Authorization: `Bearer ${UPSTASH_TOKEN}` } });
            
            if (respuesta.ok) {
                document.getElementById('formulario-boda').style.display = 'none';
                document.getElementById('mensaje-final').style.display = 'block';
            } else {
                throw new Error("Error en la respuesta");
            }
        } catch (error) {
            alert("Hubo un problema con el envío.");
            btn.innerText = "CONFIRMAR ASISTENCIA";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
