<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Configuración de Vista Previa para WhatsApp -->
    <meta property="og:title" content="Boda Ainhoa y Víctor">
    <meta property="og:description" content="Nos haría mucha ilusión que nos acompañaras en este día tan especial. Confirma tu asistencia aquí.">
    <meta property="og:image" content="https://victoryainhoa.github.io/boda/imagen.webp">
    <meta property="og:image:type" content="image/webp">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://tu-usuario.github.io">
    <meta property="og:type" content="website">

<!-- Twitter Card (opcional, por si se comparte ahí) -->
<meta name="twitter:card" content="summary_large_image">
    <title>Boda Ainhoa y Víctor</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --color-beige: #f5f5dc;
            --color-crema: #fffaf0;
            --color-dorado: #b8860b;
            --color-texto: #5d4037;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--color-beige);
            color: var(--color-texto);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--color-crema);
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid rgba(184, 134, 11, 0.2);
            transition: opacity 0.5s ease;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--color-dorado);
            margin-bottom: 30px;
            font-style: italic;
        }

        label {
            display: block;
            text-align: left;
            margin-bottom: 8px;
            font-weight: 400;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--color-dorado);
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #dcdcdc;
            border-radius: 4px;
            box-sizing: border-box;
            background-color: white;
            font-size: 1rem;
            color: var(--color-texto);
        }

        textarea {
            resize: vertical;
            height: 80px;
        }

        .btn-save {
            width: 100%;
            padding: 15px;
            cursor: pointer;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background-color: var(--color-dorado);
            color: white;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            opacity: 0.8;
            transform: translateY(-1px);
        }

        #mensaje-final {
            display: none; /* Oculto por defecto */
            padding: 20px;
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-style: italic;
            color: var(--color-texto);
            line-height: 1.6;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div id="formulario-boda">
        <h1>Boda Ainhoa y Víctor</h1>
        
        <label for="nombreInput">Nombre</label>
        <input type="text" id="nombreInput" placeholder="Tu nombre">

        <label for="apellidoInput">Apellidos</label>
        <input type="text" id="apellidoInput" placeholder="Tus apellidos">

        <label for="numInput">Número de acompañantes</label>
        <input type="number" id="numInput" value="0" min="0">

        <label for="alergiaInput">¿Tienes alguna alergia?</label>
        <input type="text" id="alergiaInput" placeholder="Indícalo aquí">

        <button class="btn-save" id="btnEnviar" onclick="guardarRegistro()">Confirmar Asistencia</button>
    </div>

    <!-- Este bloque se mostrará solo al terminar -->
    <div id="mensaje-final">
        ✨ <br>
        <b>¡Confirmación enviada!</b><br>
        Muchas gracias por compartir este día tan especial con nosotros.<br>
        <span style="font-size: 1rem; color: var(--color-dorado);">Ainhoa & Víctor</span>
    </div>
</div>

<script>
    const UPSTASH_URL = "https://glad-lizard-60703.upstash.io";
    const UPSTASH_TOKEN = "Ae0fAAIncDE4YjZlNGY4ZTYzMDE0ZGVjODcwZmE0NGRiNmY2NzJmNHAxNjA3MDM";

    async function guardarRegistro() {
        const nombre = document.getElementById('nombreInput').value.trim();
        const apellido = document.getElementById('apellidoInput').value.trim();
        const num = document.getElementById('numInput').value.trim();
        const alergia = document.getElementById('alergiaInput').value.trim();
        const btn = document.getElementById('btnEnviar');

        if (!nombre || !apellido) {
            alert("Por favor, introduce al menos tu Nombre y Apellido.");
            return;
        }

        btn.innerText = "⏳ ENVIANDO...";
        btn.disabled = true;

        const redisKey = `${nombre}_${apellido}`;
        const datos = {
            acompañantes: num || "0",
            alergias: alergia || "Ninguna"
        };

        try {
            const url = `${UPSTASH_URL}/set/${encodeURIComponent(redisKey)}/${encodeURIComponent(JSON.stringify(datos))}`;
            const respuesta = await fetch(url, { headers: { Authorization: `Bearer ${UPSTASH_TOKEN}` } });
            
            if (respuesta.ok) {
                // EFECTO: Ocultar formulario y mostrar mensaje de éxito
                document.getElementById('formulario-boda').style.display = 'none';
                document.getElementById('mensaje-final').style.display = 'block';
            } else {
                throw new Error("Error en la respuesta");
            }
        } catch (error) {
            alert("Hubo un problema con el envío. Por favor, inténtalo de nuevo.");
            btn.innerText = "CONFIRMAR ASISTENCIA";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
